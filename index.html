<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TC COIN (TCA)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>TC COIN</h1>
      <p>TCA Mining System</p>
    </div>

    <div class="score-box">
      <span id="score">0</span>
      
      <p>Energy: <span id="energy">100 / 100</span></p>
      
      <p>TCA Balance</p>
    </div>

    <div class="coin" onclick="tapCoin()">
      💰
    </div>
<button class="btn" onclick="upgrade()">Upgrade (100 TCA)</button>
    <p class="hint">Tap the coin to mine TCA</p>
<button class="btn" onclick="claimDaily()">Daily Reward</button>
  </div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="script.js"></script>
</body>
</html>

<div class="leaderboard" id="leaderboard"></div>

<p id="user"></p>
