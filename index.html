<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TC COIN (TCA)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="header">

<button class="btn" onclick="upgrade()">Upgrade (100 TCA)</button>

  </div>

  <script src="script.js"></script>

</html>
